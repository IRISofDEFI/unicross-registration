<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNICROSS Portal — Payment Result</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .callback-icon {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.75rem;
      margin-bottom: 1.25rem;
    }
    .callback-icon.success { background-color: #d4edda; color: var(--unicross-success); }
    .callback-icon.failed  { background-color: #f8d7da; color: var(--unicross-danger);  }
    .callback-icon.pending { background-color: #fff3cd; color: #856404; }

    .ref-box {
      background-color: #f4f6f9;
      border: 1px solid #dee2e6;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin: 1.25rem auto;
      max-width: 420px;
      text-align: left;
    }
    .ref-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c757d;
      margin-bottom: 0.25rem;
    }
    .ref-value {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--unicross-navy);
      word-break: break-all;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .pending-spinner {
      display: inline-block;
      width: 2.75rem;
      height: 2.75rem;
      border: 4px solid #ffc107;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #countdown {
      font-weight: 700;
      color: var(--unicross-navy);
    }
  </style>
</head>
<body class="page-wrapper">

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <img src="../unicross_logo.jpg" height="60" alt="University Logo" class="header-logo institution-logo" />
        <div class="header-divider"></div>
        <div class="wordmark">
          <div>
            <span class="brand-main">UNICROSS</span>
            <span class="brand-sub ms-2">PORTAL</span>
          </div>
          <div class="university-name institution-name">University of Cross River State</div>
        </div>
        <div class="header-session-label">2025/2026 Screening Registration</div>
      </div>
    </div>
  </header>

  <main class="page-content">

    <!-- PAGE TITLE -->
    <div class="page-title-bar">
      <div class="container">
        <h2>Payment Status</h2>
        <p>E-Pin Registration &mdash; Payment Result</p>
      </div>
    </div>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div id="callback-content" class="text-center">
            <!-- populated by DOMContentLoaded -->
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer text-center">
    <div class="container">
      <p class="mb-0">&copy; 2025 <span class="institution-name">University of Cross River State</span>. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var params        = new URLSearchParams(window.location.search);
      var status        = (params.get('status')         || '').trim().toLowerCase();
      var reference     = params.get('reference')       || params.get('trxref') || params.get('transaction_id') || '';
      var trxref        = params.get('trxref')          || '';
      var transactionId = params.get('transaction_id')  || '';

      function esc(str) {
        return String(str == null ? '' : str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function refBox(label, value) {
        if (!value) return '';
        return '<div class="ref-box">' +
          '<div class="ref-label">' + esc(label) + '</div>' +
          '<div class="ref-value">'  + esc(value) + '</div>' +
        '</div>';
      }

      var container = document.getElementById('callback-content');

      /* ── SUCCESS: explicit status=success OR trxref present (Credo sends trxref on success) ── */
      if (status === 'success' || trxref) {
        container.innerHTML =
          '<div class="callback-icon success">&#10003;</div>' +
          '<h2 class="fw-bold mb-2" style="color:var(--unicross-success);">Payment Successful!</h2>' +
          '<p class="text-muted mb-0" style="font-size:0.95rem;">' +
            'Your E-Pin will be sent to your registered email address shortly.' +
            ' Please check your inbox and spam folder.' +
          '</p>' +
          refBox('Transaction Reference', reference) +
          '<div class="d-grid mt-4">' +
            '<a href="../index.html" class="btn btn-unicross-blue btn-lg">Login with E-Pin</a>' +
          '</div>' +
          '<p class="text-muted mt-3 mb-0" style="font-size:0.82rem;">' +
            'Use your JAMB registration number and the E-Pin sent to you to log in.' +
          '</p>';

      /* ── FAILED / CANCELLED ── */
      } else if (status === 'failed' || status === 'cancelled') {
        container.innerHTML =
          '<div class="callback-icon failed">&#10005;</div>' +
          '<h2 class="fw-bold mb-2" style="color:var(--unicross-danger);">Payment Not Completed</h2>' +
          '<p class="text-muted mb-0" style="font-size:0.95rem;">' +
            'Your payment was not completed. No charge has been made to your account.' +
          '</p>' +
          refBox('Transaction Reference', reference) +
          '<div class="d-grid mt-4">' +
            '<a href="../payment.html" class="btn btn-unicross-blue btn-lg">Try Again</a>' +
          '</div>' +
          '<div class="mt-3">' +
            '<a href="../index.html" class="text-secondary" style="font-size:0.875rem;">' +
              '&larr; Return to Home' +
            '</a>' +
          '</div>';

      /* ── PENDING / UNKNOWN — auto-refresh after 5 s ── */
      } else {
        container.innerHTML =
          '<div class="callback-icon pending">' +
            '<div class="pending-spinner"></div>' +
          '</div>' +
          '<h2 class="fw-bold mb-2" style="color:#856404;">Verifying Payment&hellip;</h2>' +
          '<p class="text-muted mb-3" style="font-size:0.95rem;">' +
            'Please wait while we confirm your payment status.' +
          '</p>' +
          '<p class="text-muted mb-4" style="font-size:0.875rem;">' +
            'This page will refresh automatically in <span id="countdown">5</span> seconds.' +
          '</p>' +
          '<div class="d-grid">' +
            '<button id="btn-check" class="btn btn-unicross-blue btn-lg">Check Status Now</button>' +
          '</div>' +
          refBox('Transaction Reference', reference);

        /* countdown + auto-refresh */
        var seconds = 5;
        var tick = setInterval(function () {
          seconds -= 1;
          var el = document.getElementById('countdown');
          if (el) el.textContent = seconds;
          if (seconds <= 0) {
            clearInterval(tick);
            window.location.reload();
          }
        }, 1000);

        /* manual refresh button */
        var btnCheck = document.getElementById('btn-check');
        if (btnCheck) {
          btnCheck.addEventListener('click', function () {
            clearInterval(tick);
            window.location.reload();
          });
        }
      }
    });
  </script>
</body>
</html>
